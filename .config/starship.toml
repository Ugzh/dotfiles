# Wallust Generated Starship Configuration

# Fixed the formatting blocks so the arrows perfectly blend into the next background color
format = """\
[оӮ¶](fg:#A17493)\
$username\
[оӮҙ](fg:#A17493 bg:#918074)\
$directory\
[оӮҙ](fg:#918074 bg:#66857C)\
$git_branch\
$git_status\
[оӮҙ](fg:#66857C bg:#03040A)\
$all\
$cmd_duration\
$jobs\
$time\
$character"""

add_newline = true

[line_break]
disabled = true

[username]
show_always = true
style_user = "fg:#020308 bg:#A17493"
style_root = "fg:#020308 bg:#222431"
format = '[о ә ]($style)'

[directory]
style = "fg:#020308 bg:#918074"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = "пҖ• ~"
"Documents" = "о—ҝ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "п‘Ҷ "
"Videos" = "пҖҪ "

[git_branch]
symbol = "пҗҳ"
style = "fg:#020308 bg:#66857C"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#020308 bg:#66857C"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'

[aws]
symbol = "оҢҪ "
style = "fg:#222431 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[c]
symbol = "оҳһ"
style = "fg:#A17493 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[docker_context]
symbol = "пҢҲ"
style = "fg:#A17493 bg:#03040A"
format = '[ $symbol $context]($style) $path '

[elixir]
symbol = "оүө"
style = "fg:#918074 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[golang]
symbol = "оҳ§"
style = "fg:#A17493 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[haskell]
symbol = "О»"
style = "fg:#918074 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[java]
symbol = "оү–"
style = "fg:#778093 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[lua]
symbol = "оҳ "
style = "fg:#A17493 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[nodejs]
symbol = "оүҸ"
style = "fg:#66857C bg:#03040A"
format = '[ $symbol ($version )]($style)'

[python]
symbol = "оҳҶ"
style = "fg:#778093 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[rust]
symbol = "оһЁ"
style = "fg:#222431 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[bun]
symbol = "оқҜ"
style = "fg:#778093 bg:#03040A"
format = '[ $symbol ($version )]($style)'

[cmd_duration]
min_time = 1
style = "fg:#778093 bg:#03040A"
format = "[ $duration]($style)"

[jobs]
symbol = "иҸҜ"
style = "fg:#778093 bg:#03040A"
format = "[ $symbol]($style)"

[time]
disabled = true
time_format = "%R"
style = "fg:#778093 bg:#03040A"
format = '[оӮҙ](fg:#03040A $style)[ п•Ә $time ](fg:#A17493 $style)'

[character]
success_symbol = "[оғҖ ](fg:#4B5162)"
error_symbol = "[оғҶ ](fg:#222431)"
