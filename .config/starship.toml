# Nord Polar Night Starship Configuration
format = """\
[оӮ¶](fg:#1F1D2E)\
$username\
[оӮҙ](fg:#1F1D2E bg:#26233A)\
$directory\
[оӮҙ](fg:#26233A bg:#403D52)\
$git_branch\
$git_status\
[оӮҙ](fg:#403D52 bg:#1F1D2E )\
$all\
$cmd_duration\
$jobs\
$time\
$character"""

add_newline = true

[line_break]
disabled = true

[username]
show_always = true
style_user = "fg:#9ccfd8 bg:#1f1d2e"
style_root = "fg:#1f1d2e bg:#1f1d2e"
format = '[о ә ]($style)'

[directory]
style = "fg:#c4a7e7 bg:#26233a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = "пҖ• ~"
"Documents" = "о—ҝ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "п‘Ҷ "
"Videos" = "пҖҪ "

[git_branch]
symbol = "пҗҳ"
style = "fg:#31748f bg:#403d52"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#9ccfd8 bg:#403d52"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'

[aws]
symbol = "оҢҪ "
style = "fg:#eb6f92 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[c]
symbol = "оҳһ"
style = "fg:#9ccfd8 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[docker_context]
symbol = "пҢҲ"
style = "fg:#9ccfd8 bg:#1f1d2e"
format = '[ $symbol $context]($style) $path '

[elixir]
symbol = "оүө"
style = "fg:#c4a7e7 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[golang]
symbol = "оҳ§"
style = "fg:#9ccfd8 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[haskell]
symbol = "О»"
style = "fg:#c4a7e7 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[java]
symbol = "оү–"
style = "fg:#f6c177 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[lua]
symbol = "оҳ "
style = "fg:#9ccfd8 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[nodejs]
symbol = "оүҸ"
style = "fg:#31748f bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[python]
symbol = "оҳҶ"
style = "fg:#f6c177 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[rust]
symbol = "оһЁ"
style = "fg:#eb6f92 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[bun]
symbol = "оқҜ"
style = "fg:#f6c177 bg:#1f1d2e"
format = '[ $symbol ($version )]($style)'

[cmd_duration]
min_time = 1
style = "fg:#f6c177 bg:#1f1d2e"
format = "[ $duration]($style)"

[jobs]
symbol = "иҸҜ"
style = "fg:#EBCB8B bg:#3B4252"
format = "[ $symbol]($style)"

[time]
disabled = true
time_format = "%R"
style = "fg:#f6c177 bg:#1f1d2e"
format = '[оӮҙ](fg:#1f1d2e $style)[ п•Ә $time ](fg:#9ccfd8 $style)'

[character]
success_symbol = "[оғҖ ](fg:#1f1d2e)"
error_symbol = "[оғҶ ](fg:#eb6f92)"
