# Catppuccin Mocha Starship Configuration

format = """\
[оӮ¶](fg:#cba6f7)\
$username\
[оӮҙ](fg:#cba6f7 bg:#a6adc8)\
$directory\
[оӮҙ](fg:#a6adc8 bg:#94e2d5)\
$git_branch\
$git_status\
[оӮҙ](fg:#94e2d5 bg:#11111b)\
$all\
$cmd_duration\
$jobs\
$time\
$character"""

add_newline = true

[line_break]
disabled = true

[username]
show_always = true
style_user = "fg:#1e1e2e bg:#cba6f7"
style_root = "fg:#1e1e2e bg:#f38ba8"
format = '[о ә ]($style)'

[directory]
style = "fg:#1e1e2e bg:#a6adc8"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = "пҖ• ~"
"Documents" = "о—ҝ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "п‘Ҷ "
"Videos" = "пҖҪ "

[git_branch]
symbol = "пҗҳ"
style = "fg:#1e1e2e bg:#94e2d5"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#1e1e2e bg:#94e2d5"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'

[aws]
symbol = "оҢҪ "
style = "fg:#1e1e2e bg:#11111b"
format = '[ $symbol ($version )]($style)'

[c]
symbol = "оҳһ"
style = "fg:#cba6f7 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[docker_context]
symbol = "пҢҲ"
style = "fg:#cba6f7 bg:#11111b"
format = '[ $symbol $context]($style) $path '

[elixir]
symbol = "оүө"
style = "fg:#a6adc8 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[golang]
symbol = "оҳ§"
style = "fg:#cba6f7 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[haskell]
symbol = "О»"
style = "fg:#a6adc8 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[java]
symbol = "оү–"
style = "fg:#b4befe bg:#11111b"
format = '[ $symbol ($version )]($style)'

[lua]
symbol = "оҳ "
style = "fg:#cba6f7 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[nodejs]
symbol = "оүҸ"
style = "fg:#94e2d5 bg:#11111b"
format = '[ $symbol ($version )]($style)'

[python]
symbol = "оҳҶ"
style = "fg:#b4befe bg:#11111b"
format = '[ $symbol ($version )]($style)'

[rust]
symbol = "оһЁ"
style = "fg:#1e1e2e bg:#11111b"
format = '[ $symbol ($version )]($style)'

[bun]
symbol = "оқҜ"
style = "fg:#b4befe bg:#11111b"
format = '[ $symbol ($version )]($style)'

[cmd_duration]
min_time = 1
style = "fg:#b4befe bg:#11111b"
format = "[ $duration]($style)"

[jobs]
symbol = "иҸҜ"
style = "fg:#b4befe bg:#11111b"
format = "[ $symbol]($style)"

[time]
disabled = true
time_format = "%R"
style = "fg:#b4befe bg:#11111b"
format = '[оӮҙ](fg:#11111b $style)[ п•Ә $time ](fg:#cba6f7 $style)'

[character]
success_symbol = "[оғҖ ](fg:#585b70)"
error_symbol = "[оғҶ ](fg:#f38ba8)"
