# Catppuccin Frappe Starship Configuration

format = """\
[оӮ¶](fg:#ca9ee6)\
$username\
[оӮҙ](fg:#ca9ee6 bg:#a5adce)\
$directory\
[оӮҙ](fg:#a5adce bg:#81c8be)\
$git_branch\
$git_status\
[оӮҙ](fg:#81c8be bg:#232634)\
$all\
$cmd_duration\
$jobs\
$time\
$character"""

add_newline = true

[line_break]
disabled = true

[username]
show_always = true
style_user = "fg:#303446 bg:#ca9ee6"
style_root = "fg:#303446 bg:#e78284"
format = '[о ә ]($style)'

[directory]
style = "fg:#303446 bg:#a5adce"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"~" = "пҖ• ~"
"Documents" = "о—ҝ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "п‘Ҷ "
"Videos" = "пҖҪ "

[git_branch]
symbol = "пҗҳ"
style = "fg:#303446 bg:#81c8be"
format = '[ $symbol $branch(:$remote_branch) ]($style)'

[git_status]
style = "fg:#303446 bg:#81c8be"
ahead = "вҮЎ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
behind = "вҮЈ${count}"
deleted = "x"
format = '[$all_status$ahead_behind ]($style)'

[aws]
symbol = "оҢҪ "
style = "fg:#303446 bg:#232634"
format = '[ $symbol ($version )]($style)'

[c]
symbol = "оҳһ"
style = "fg:#ca9ee6 bg:#232634"
format = '[ $symbol ($version )]($style)'

[docker_context]
symbol = "пҢҲ"
style = "fg:#ca9ee6 bg:#232634"
format = '[ $symbol $context]($style) $path '

[elixir]
symbol = "оүө"
style = "fg:#a5adce bg:#232634"
format = '[ $symbol ($version )]($style)'

[golang]
symbol = "оҳ§"
style = "fg:#ca9ee6 bg:#232634"
format = '[ $symbol ($version )]($style)'

[haskell]
symbol = "О»"
style = "fg:#a5adce bg:#232634"
format = '[ $symbol ($version )]($style)'

[java]
symbol = "оү–"
style = "fg:#babbf1 bg:#232634"
format = '[ $symbol ($version )]($style)'

[lua]
symbol = "оҳ "
style = "fg:#ca9ee6 bg:#232634"
format = '[ $symbol ($version )]($style)'

[nodejs]
symbol = "оүҸ"
style = "fg:#81c8be bg:#232634"
format = '[ $symbol ($version )]($style)'

[python]
symbol = "оҳҶ"
style = "fg:#babbf1 bg:#232634"
format = '[ $symbol ($version )]($style)'

[rust]
symbol = "оһЁ"
style = "fg:#303446 bg:#232634"
format = '[ $symbol ($version )]($style)'

[bun]
symbol = "оқҜ"
style = "fg:#babbf1 bg:#232634"
format = '[ $symbol ($version )]($style)'

[cmd_duration]
min_time = 1
style = "fg:#babbf1 bg:#232634"
format = "[ $duration]($style)"

[jobs]
symbol = "иҸҜ"
style = "fg:#babbf1 bg:#232634"
format = "[ $symbol]($style)"

[time]
disabled = true
time_format = "%R"
style = "fg:#babbf1 bg:#232634"
format = '[оӮҙ](fg:#232634 $style)[ п•Ә $time ](fg:#ca9ee6 $style)'

[character]
success_symbol = "[оғҖ ](fg:#626880)"
error_symbol = "[оғҶ ](fg:#e78284)"
