# Catppuccin Frappe
set -g pane-active-border-style 'fg=#ca9ee6,bg=default' # Mauve border
set -g pane-border-style 'fg=#626880,bg=default'        # Surface0 border

# Floax Colors
set -g @floax-border-color '#ca9ee6'
set -g @floax-text-color '#c6d0f5'

# Minimalist Status Bar
set -g status-style 'bg=#303446,fg=#c6d0f5'
set -g status-left '#[bg=#a5adce,fg=#303446,bold] #S #[bg=#303446,fg=#a5adce,nobold] '
set -g status-right '#[fg=#a5adce,bg=#303446] %H:%M '
setw -g window-status-current-style 'bg=#ca9ee6,fg=#303446,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'bg=#303446,fg=#a5adce'
setw -g window-status-format ' #I:#W '
